<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
     <link rel="stylesheet" href="bootstrap/bootstrap-5.3.8-dist/css/bootstrap-min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <!-- item aktif-->
      <h3> menandai item yang sedang dipilih</h3>
    <ul class="list-group">
        <li class="list-group-item active"> Matematika</li>
        <li class="list-group-item"> IPA</li>
        <li class="list-group-item"> Bahasa Indonesia</li>
    </ul>

    <!--dengan link atau tombol-->
<h3>menggunakan link atau tombol </h3>

<div class="list-group">
    <a class="list-group-item list-group-item-action active"
    >Menu Utama </a>
    <a class="list-group-item list-group-item-action"> Profil</a>
    <a class="list-group-item list-group-item-action"> Pengaturan</a> 
    </div>

    <!--List dengan Badge -->
    <h3> list dengan badge </h3>
<div class="list-group">
    <a href="#" class="list-group-item list-group-item-action active"> Menu Utama</a>
    <a href="#" class="list-group-item list-group-item-action"> Profil</a>
    <a href="#" class="list-group-item list-group-item-action"> Pengaturan</a>
</div>

<ul class="list-group">
    <li
    class="list-group-item d-flex justify-content-between align-items-center"> Pesan 
    <span class="badge bg-primary rounded-pill"> 5 </span>
    </li>

     <li
    class="list-group-item d-flex justify-content-between align-items-center"> Tugas
    <span class="badge bg-danger rounded-pill"> 2 </span>
    </li>
</ul>

<!--list Horizontal-->
<h3> list Horizontal--</h3>
<ul class="list-group list-group-horizontal">
    <li class="list-group-item"> Nasi </li>

</ul>
